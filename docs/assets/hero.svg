<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF6EF"/>
      <stop offset="1" stop-color="#F4E7CF"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F4B65C"/>
      <stop offset="1" stop-color="#E08A3C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#F4B65C" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#F4B65C" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#C9883A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="440" rx="28" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="380" r="240" fill="url(#glow)"/>

  <!-- Bowl mark -->
  <g transform="translate(150,150)" filter="url(#soft)">
    <circle cx="70" cy="70" r="70" fill="#FFFFFF"/>
    <path d="M22 70 a48 48 0 0 0 96 0 Z" fill="url(#honey)"/>
    <ellipse cx="70" cy="70" rx="48" ry="13" fill="#FFE6B8"/>
    <path d="M55 38 c0 -12 12 -12 12 -24" stroke="#E08A3C" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M78 40 c0 -10 10 -10 10 -22" stroke="#E08A3C" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="330" y="190" font-size="92" font-weight="800" fill="#2B2620" letter-spacing="-2">Oatmeal</text>
  <text x="334" y="248" font-size="30" font-weight="500" fill="#8C8170">Private, on-device meeting notes for macOS.</text>
  <text x="334" y="288" font-size="22" font-weight="400" fill="#B3A998">Record · transcribe · summarize · chat — all without leaving your Mac.</text>

  <!-- Pills -->
  <g transform="translate(334,330)" font-size="18" font-weight="600">
    <g>
      <rect width="232" height="46" rx="23" fill="#2B2620"/>
      <circle cx="28" cy="23" r="6" fill="#79B889"/>
      <text x="48" y="30" fill="#F3EDE3">100% on-device</text>
    </g>
    <g transform="translate(248,0)">
      <rect width="180" height="46" rx="23" fill="#FFFFFF" stroke="#EADFCE"/>
      <text x="24" y="30" fill="#2B2620">Local LLM</text>
      <circle cx="156" cy="23" r="6" fill="#F4B65C"/>
    </g>
    <g transform="translate(444,0)">
      <rect width="158" height="46" rx="23" fill="#FFFFFF" stroke="#EADFCE"/>
      <text x="24" y="30" fill="#2B2620">No cloud</text>
    </g>
  </g>
</svg>
