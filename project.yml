name: Oatmeal
options:
  bundleIdPrefix: com.oatmeal
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  FluidAudio:
    # Pinned EXACTLY: Package.resolved is gitignored, so a `from:` range let the
    # library drift silently between builds (0.15.x changed silent-audio
    # diarization from "no segments" to throwing noSpeechDetected, breaking solo
    # recordings until buildTranscript caught it). Upgrades should be deliberate.
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: "0.15.2"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"
  Sparkle:
    # The de-facto macOS auto-updater. Pinned EXACTLY (Package.resolved is
    # gitignored, so a range would drift silently between builds). 2.9.2 was the
    # newest stable release public for >7 days when added (2.9.3 was 6 days old).
    # Bump deliberately. See plans/015-one-click-updates-sparkle.md.
    url: https://github.com/sparkle-project/Sparkle.git
    exactVersion: "2.9.2"
targets:
  Oatmeal:
    type: application
    platform: macOS
    sources:
      - path: Oatmeal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oatmeal.Oatmeal
        PRODUCT_NAME: Oatmeal
        MARKETING_VERSION: "0.7.6"
        CURRENT_PROJECT_VERSION: "13"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Oatmeal/Info.plist
        CODE_SIGN_ENTITLEMENTS: Oatmeal/Oatmeal.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Oatmeal/Oatmeal-Bridging-Header.h
        CLANG_ENABLE_MODULES: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
  OatmealMCP:
    type: tool
    platform: macOS
    sources:
      - path: OatmealMCP
    settings:
      base:
        PRODUCT_NAME: oatmeal-mcp
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
