name: Oatmeal
options:
  bundleIdPrefix: com.oatmeal
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.12.4"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"
targets:
  Oatmeal:
    type: application
    platform: macOS
    sources:
      - path: Oatmeal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oatmeal.Oatmeal
        PRODUCT_NAME: Oatmeal
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Oatmeal/Info.plist
        CODE_SIGN_ENTITLEMENTS: Oatmeal/Oatmeal.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Oatmeal/Oatmeal-Bridging-Header.h
        CLANG_ENABLE_MODULES: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
  OatmealMCP:
    type: tool
    platform: macOS
    sources:
      - path: OatmealMCP
    settings:
      base:
        PRODUCT_NAME: oatmeal-mcp
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
